# CI-Gate — spiegelt das lokale „Gate vor fertig" (CLAUDE.md):
#   npm run check (svelte-check + Drift-Checks) · lint · vitest · build
#
# Drift-Checks: 7 von 8 laufen mit `--strict` und blockieren bei Befund (nav,
# tokens, assets, component-drift, content, zds-sync, token-refs). Einzige
# Ausnahme ist check-doc-coverage — es meldet aktuell 1 bewusste Lücke
# (`cell`: nur 1 Zustand dokumentiert) und bleibt daher im Warn-Modus.
# Aufrüst-Pfad: sobald die Lücke gefüllt ist, auch dort `--strict` ergänzen.
#
# `npm run lint` läuft mit `--max-warnings 27` als Ratsche: 0 Fehler, und die
# Warnungszahl darf nicht über den Status quo wachsen. Die 27 verbleibenden
# Warnungen sind fast alle `custom_element_props_identifier` aus den Icon-/
# Row-Komponenten (`{...rest}`-Spread) — irrelevant, weil hier nichts als
# Custom Element kompiliert wird. Wer sie abbaut, zieht die Zahl mit nach unten.
name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      # Dummy-Credentials NUR für den CI-Build (der Build verlangt USERS);
      # echte Zugänge leben ausschließlich in den Vercel-Env-Vars.
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check (svelte-check + Drift)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # E2E-Smoke (Playwright): CMS-Kernflüsse gegen den Dev-Server. Läuft mit den
  # committeten Hooks (Basic-Auth aktiv) — die Tests authentifizieren sich mit
  # den Dummy-USERS via httpCredentials (playwright.config.ts).
  e2e:
    runs-on: ubuntu-latest
    env:
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Playwright-Browser
        run: npx playwright install --with-deps chromium

      - name: E2E-Smoke
        run: npx playwright test
