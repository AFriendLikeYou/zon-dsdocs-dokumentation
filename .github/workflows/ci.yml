# CI-Gate — spiegelt das lokale „Gate vor fertig" (CLAUDE.md):
#   npm run check (svelte-check hart + Drift-Checks warn) · lint · vitest · build
#
# Die Drift-Checks laufen hier wie lokal im Warn-Modus (Exit 0) — sie erscheinen
# im Log, blockieren aber nicht. Aufrüst-Pfad: einzelne Checks auf --strict heben,
# sobald ihr Befund auf 0 ist (check-doc-coverage meldet aktuell bewusst 4 Lücken).
name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      # Dummy-Credentials NUR für den CI-Build (der Build verlangt USERS);
      # echte Zugänge leben ausschließlich in den Vercel-Env-Vars.
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check (svelte-check + Drift)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # E2E-Smoke (Playwright): CMS-Kernflüsse gegen den Dev-Server. Läuft mit den
  # committeten Hooks (Basic-Auth aktiv) — die Tests authentifizieren sich mit
  # den Dummy-USERS via httpCredentials (playwright.config.ts).
  e2e:
    runs-on: ubuntu-latest
    env:
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Playwright-Browser
        run: npx playwright install --with-deps chromium

      - name: E2E-Smoke
        run: npx playwright test
