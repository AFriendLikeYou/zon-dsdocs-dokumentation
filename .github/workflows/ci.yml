# CI-Gate — spiegelt das lokale „Gate vor fertig" (CLAUDE.md):
#   npm run check (svelte-check + Drift-Checks) · lint · vitest · build
#
# Drift-Checks: 7 von 8 laufen mit `--strict` und blockieren bei Befund (nav,
# tokens, assets, component-drift, content, zds-sync, token-refs). Einzige
# Ausnahme ist check-doc-coverage — es meldet aktuell 1 bewusste Lücke
# (`cell`: nur 1 Zustand dokumentiert) und bleibt daher im Warn-Modus.
# Aufrüst-Pfad: sobald die Lücke gefüllt ist, auch dort `--strict` ergänzen.
#
# `npm run lint` läuft mit `--max-warnings 27` als Ratsche: 0 Fehler, und die
# Warnungszahl darf nicht über den Status quo wachsen. Die 27 verbleibenden
# Warnungen sind fast alle `custom_element_props_identifier` aus den Icon-/
# Row-Komponenten (`{...rest}`-Spread) — irrelevant, weil hier nichts als
# Custom Element kompiliert wird. Wer sie abbaut, zieht die Zahl mit nach unten.
name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      # Dummy-Credentials NUR für den CI-Build (der Build verlangt USERS);
      # echte Zugänge leben ausschließlich in den Vercel-Env-Vars.
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check (svelte-check + Drift)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # E2E (Playwright): CMS-Kernflüsse, MCP/llms.txt, **visuelle Regression**
  # (Screenshot-Snapshots, hell + dunkel) und **A11y** (axe-core, WCAG 2.0/2.1 A+AA).
  # Läuft mit den committeten Hooks (Basic-Auth aktiv) — die Tests
  # authentifizieren sich mit den Dummy-USERS via httpCredentials
  # (playwright.config.ts).
  #
  # Snapshot-Hinweis: Die Referenzbilder liegen plattformgetrennt unter
  # e2e/__screenshots__/<platform>/. CI vergleicht gegen `linux`; lokal auf macOS
  # entsteht `darwin`. Ein Snapshot-Fehlschlag lädt unten den HTML-Report als
  # Artefakt hoch (erwartet/aktuell/diff) — sonst ist er nicht diagnostizierbar.
  e2e:
    runs-on: ubuntu-latest
    env:
      USERS: '[{"username":"ci","password":"ci-only"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Playwright-Browser
        run: npx playwright install --with-deps chromium

      - name: E2E (Smoke + Visuelle Regression + A11y)
        run: npx playwright test

      # Bei Fehlschlag: Report + Diff-Bilder sichern. `if: failure()` — im
      # Grünfall gibt es nichts zu holen.
      - name: Playwright-Report hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Die rohen Artefakte enthalten die *-actual.png / *-diff.png je Fehlschlag —
      # damit lässt sich ein Snapshot-Bruch ohne lokalen Nachbau beurteilen.
      - name: Test-Artefakte hochladen (Screenshots/Diffs/Traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
